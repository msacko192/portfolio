<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>DJEXA — Logo Proposals v1</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #fff; }
.grid {
  display: grid;
  grid-template-columns: repeat(5, 1fr);
}
.cell {
  aspect-ratio: 1;
  border: 1px solid #e5e5e5;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 24px;
}
.cell svg {
  width: 100%;
  height: 100%;
  max-width: 80px;
  max-height: 80px;
}
</style>
</head>
<body>
<div class="grid">

<!-- 1. Bold X -->
<div class="cell">
<svg viewBox="0 0 500 500" xmlns="http://www.w3.org/2000/svg">
<path fill="#000" d="M 100,65 L 250,200 L 400,65 L 435,100 L 300,250 L 435,400 L 400,435 L 250,300 L 100,435 L 65,400 L 200,250 L 65,100 Z"/>
</svg>
</div>

<!-- 2. Thin X -->
<div class="cell">
<svg viewBox="0 0 500 500" xmlns="http://www.w3.org/2000/svg">
<path fill="#000" d="M 118,83 L 250,215 L 382,83 L 417,118 L 285,250 L 417,382 L 382,417 L 250,285 L 118,417 L 83,382 L 215,250 L 83,118 Z"/>
</svg>
</div>

<!-- 3. X + circle frame -->
<div class="cell">
<svg viewBox="0 0 500 500" xmlns="http://www.w3.org/2000/svg">
<path fill="#000" d="M 130,100 L 250,218 L 370,100 L 400,130 L 282,250 L 400,370 L 370,400 L 250,282 L 130,400 L 100,370 L 218,250 L 100,130 Z"/>
<circle cx="250" cy="250" r="215" fill="none" stroke="#000" stroke-width="22"/>
</svg>
</div>

<!-- 4. White X in black circle -->
<div class="cell">
<svg viewBox="0 0 500 500" xmlns="http://www.w3.org/2000/svg">
<path fill="#000" fill-rule="evenodd" d="M 28,250 A 222,222 0 1,0 472,250 A 222,222 0 1,0 28,250 Z M 100,65 L 250,200 L 400,65 L 435,100 L 300,250 L 435,400 L 400,435 L 250,300 L 100,435 L 65,400 L 200,250 L 65,100 Z"/>
</svg>
</div>

<!-- 5. Hairline X -->
<div class="cell">
<svg viewBox="0 0 500 500" xmlns="http://www.w3.org/2000/svg">
<line x1="80" y1="80" x2="420" y2="420" stroke="#000" stroke-width="30" stroke-linecap="round"/>
<line x1="420" y1="80" x2="80" y2="420" stroke="#000" stroke-width="30" stroke-linecap="round"/>
</svg>
</div>

<!-- 6. Hollow D (curved) -->
<div class="cell">
<svg viewBox="0 0 500 500" xmlns="http://www.w3.org/2000/svg">
<path fill="#000" fill-rule="evenodd" d="M 145,100 L 228,100 Q 430,100 430,250 Q 430,400 228,400 L 145,400 Z M 228,155 L 228,345 Q 368,345 368,250 Q 368,155 228,155 Z"/>
</svg>
</div>

<!-- 7. Bold bar D (wide left bar, thin arc) -->
<div class="cell">
<svg viewBox="0 0 500 500" xmlns="http://www.w3.org/2000/svg">
<path fill="#000" fill-rule="evenodd" d="M 125,100 L 255,100 Q 405,100 405,250 Q 405,400 255,400 L 125,400 Z M 255,168 L 255,332 Q 338,332 338,250 Q 338,168 255,168 Z"/>
</svg>
</div>

<!-- 8. Angular polygon D -->
<div class="cell">
<svg viewBox="0 0 500 500" xmlns="http://www.w3.org/2000/svg">
<path fill="#000" fill-rule="evenodd" d="M 145,100 L 240,100 L 400,168 L 425,250 L 400,332 L 240,400 L 145,400 Z M 240,152 L 355,205 L 373,250 L 355,295 L 240,348 Z"/>
</svg>
</div>

<!-- 9. White D in black rounded square -->
<div class="cell">
<svg viewBox="0 0 500 500" xmlns="http://www.w3.org/2000/svg">
<rect x="52" y="52" width="396" height="396" rx="52" fill="#000"/>
<path fill="white" fill-rule="evenodd" d="M 148,143 L 218,143 Q 378,143 378,250 Q 378,357 218,357 L 148,357 Z M 218,185 L 218,315 Q 333,315 333,250 Q 333,185 218,185 Z"/>
</svg>
</div>

<!-- 10. Nested squares -->
<div class="cell">
<svg viewBox="0 0 500 500" xmlns="http://www.w3.org/2000/svg">
<rect x="78" y="78" width="344" height="344" rx="16" fill="none" stroke="#000" stroke-width="48"/>
<rect x="162" y="162" width="176" height="176" rx="10" fill="#000"/>
</svg>
</div>

<!-- 11. 3 decreasing bars -->
<div class="cell">
<svg viewBox="0 0 500 500" xmlns="http://www.w3.org/2000/svg">
<rect x="100" y="128" width="300" height="54" rx="10" fill="#000"/>
<rect x="148" y="223" width="204" height="54" rx="10" fill="#000"/>
<rect x="196" y="318" width="108" height="54" rx="10" fill="#000"/>
</svg>
</div>

<!-- 12. 3 diagonal bars (Linear style) -->
<div class="cell">
<svg viewBox="0 0 500 500" xmlns="http://www.w3.org/2000/svg">
<g transform="rotate(-22 250 250)">
<rect x="60" y="165" width="380" height="52" rx="26" fill="#000"/>
<rect x="60" y="234" width="380" height="52" rx="26" fill="#000"/>
<rect x="60" y="303" width="380" height="52" rx="26" fill="#000"/>
</g>
</svg>
</div>

<!-- 13. Node triangle -->
<div class="cell">
<svg viewBox="0 0 500 500" xmlns="http://www.w3.org/2000/svg">
<line x1="250" y1="132" x2="122" y2="362" stroke="#000" stroke-width="20"/>
<line x1="250" y1="132" x2="378" y2="362" stroke="#000" stroke-width="20"/>
<line x1="140" y1="378" x2="360" y2="378" stroke="#000" stroke-width="20"/>
<circle cx="250" cy="110" r="44" fill="#000"/>
<circle cx="106" cy="392" r="44" fill="#000"/>
<circle cx="394" cy="392" r="44" fill="#000"/>
</svg>
</div>

<!-- 14. Concentric arcs + center dot -->
<div class="cell">
<svg viewBox="0 0 500 500" xmlns="http://www.w3.org/2000/svg">
<path d="M 58,250 A 192,192 0 1,1 442,250" fill="none" stroke="#000" stroke-width="50" stroke-linecap="round"/>
<path d="M 110,250 A 140,140 0 1,1 390,250" fill="none" stroke="#000" stroke-width="38" stroke-linecap="round"/>
<circle cx="250" cy="250" r="30" fill="#000"/>
</svg>
</div>

<!-- 15. Bold right arrow -->
<div class="cell">
<svg viewBox="0 0 500 500" xmlns="http://www.w3.org/2000/svg">
<path fill="#000" d="M 68,205 L 293,205 L 293,128 L 438,250 L 293,372 L 293,295 L 68,295 Z"/>
</svg>
</div>

<!-- 16. X in black rounded square -->
<div class="cell">
<svg viewBox="0 0 500 500" xmlns="http://www.w3.org/2000/svg">
<rect x="52" y="52" width="396" height="396" rx="52" fill="#000"/>
<path fill="white" d="M 140,105 L 250,213 L 360,105 L 395,140 L 287,250 L 395,360 L 360,395 L 250,287 L 140,395 L 105,360 L 213,250 L 105,140 Z"/>
</svg>
</div>

<!-- 17. Code brackets < > -->
<div class="cell">
<svg viewBox="0 0 500 500" xmlns="http://www.w3.org/2000/svg">
<path d="M 233,110 L 92,250 L 233,390" fill="none" stroke="#000" stroke-width="54" stroke-linecap="round" stroke-linejoin="round"/>
<path d="M 267,110 L 408,250 L 267,390" fill="none" stroke="#000" stroke-width="54" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
</div>

<!-- 18. Orbital -->
<div class="cell">
<svg viewBox="0 0 500 500" xmlns="http://www.w3.org/2000/svg">
<circle cx="250" cy="250" r="182" fill="none" stroke="#000" stroke-width="20"/>
<circle cx="250" cy="68" r="30" fill="#000"/>
<circle cx="250" cy="250" r="58" fill="#000"/>
</svg>
</div>

<!-- 19. Double chevron >> -->
<div class="cell">
<svg viewBox="0 0 500 500" xmlns="http://www.w3.org/2000/svg">
<path fill="#000" d="M 52,115 L 182,250 L 52,385 L 102,385 L 232,250 L 102,115 Z"/>
<path fill="#000" d="M 268,115 L 398,250 L 268,385 L 318,385 L 448,250 L 318,115 Z"/>
</svg>
</div>

<!-- 20. Dot matrix D -->
<div class="cell">
<svg viewBox="0 0 500 500" xmlns="http://www.w3.org/2000/svg">
<circle cx="110" cy="70" r="23" fill="#000"/>
<circle cx="182" cy="70" r="23" fill="#000"/>
<circle cx="254" cy="70" r="23" fill="#000"/>
<circle cx="110" cy="133" r="23" fill="#000"/>
<circle cx="326" cy="133" r="23" fill="#000"/>
<circle cx="110" cy="196" r="23" fill="#000"/>
<circle cx="394" cy="196" r="23" fill="#000"/>
<circle cx="110" cy="259" r="23" fill="#000"/>
<circle cx="394" cy="259" r="23" fill="#000"/>
<circle cx="110" cy="322" r="23" fill="#000"/>
<circle cx="394" cy="322" r="23" fill="#000"/>
<circle cx="110" cy="385" r="23" fill="#000"/>
<circle cx="326" cy="385" r="23" fill="#000"/>
<circle cx="110" cy="448" r="23" fill="#000"/>
<circle cx="182" cy="448" r="23" fill="#000"/>
<circle cx="254" cy="448" r="23" fill="#000"/>
</svg>
</div>

</div>
</body>
</html>

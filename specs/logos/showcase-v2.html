<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>DJEXA — Logo Proposals v2 — Orbital</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #fff; }
.grid {
  display: grid;
  grid-template-columns: repeat(5, 1fr);
}
.cell {
  aspect-ratio: 1;
  border: 1px solid #e5e5e5;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 24px;
}
.cell svg {
  width: 100%;
  height: 100%;
  max-width: 80px;
  max-height: 80px;
}
</style>
</head>
<body>
<div class="grid">

<!-- 1. Original raffiné -->
<div class="cell">
<svg viewBox="0 0 500 500" xmlns="http://www.w3.org/2000/svg">
<circle cx="250" cy="250" r="182" fill="none" stroke="#000" stroke-width="20"/>
<circle cx="250" cy="68" r="30" fill="#000"/>
<circle cx="250" cy="250" r="58" fill="#000"/>
</svg>
</div>

<!-- 2. Planète à 45° (haut-droite) -->
<div class="cell">
<svg viewBox="0 0 500 500" xmlns="http://www.w3.org/2000/svg">
<circle cx="250" cy="250" r="182" fill="none" stroke="#000" stroke-width="20"/>
<circle cx="379" cy="121" r="30" fill="#000"/>
<circle cx="250" cy="250" r="58" fill="#000"/>
</svg>
</div>

<!-- 3. Deux planètes (haut + bas) -->
<div class="cell">
<svg viewBox="0 0 500 500" xmlns="http://www.w3.org/2000/svg">
<circle cx="250" cy="250" r="182" fill="none" stroke="#000" stroke-width="20"/>
<circle cx="250" cy="68" r="28" fill="#000"/>
<circle cx="250" cy="432" r="28" fill="#000"/>
<circle cx="250" cy="250" r="55" fill="#000"/>
</svg>
</div>

<!-- 4. Trois planètes (120° entre elles) -->
<div class="cell">
<svg viewBox="0 0 500 500" xmlns="http://www.w3.org/2000/svg">
<circle cx="250" cy="250" r="182" fill="none" stroke="#000" stroke-width="20"/>
<circle cx="250" cy="68" r="26" fill="#000"/>
<circle cx="92" cy="341" r="26" fill="#000"/>
<circle cx="408" cy="341" r="26" fill="#000"/>
<circle cx="250" cy="250" r="50" fill="#000"/>
</svg>
</div>

<!-- 5. Anneau épais seul -->
<div class="cell">
<svg viewBox="0 0 500 500" xmlns="http://www.w3.org/2000/svg">
<circle cx="250" cy="250" r="165" fill="none" stroke="#000" stroke-width="62"/>
</svg>
</div>

<!-- 6. Arc partiel 300° + planète à l'ouverture -->
<div class="cell">
<svg viewBox="0 0 500 500" xmlns="http://www.w3.org/2000/svg">
<path d="M 90,158 A 185,185 0 1,1 90,342" fill="none" stroke="#000" stroke-width="22" stroke-linecap="round"/>
<circle cx="90" cy="158" r="32" fill="#000"/>
<circle cx="250" cy="250" r="56" fill="#000"/>
</svg>
</div>

<!-- 7. Double orbite + deux planètes -->
<div class="cell">
<svg viewBox="0 0 500 500" xmlns="http://www.w3.org/2000/svg">
<circle cx="250" cy="250" r="128" fill="none" stroke="#000" stroke-width="18"/>
<circle cx="250" cy="250" r="208" fill="none" stroke="#000" stroke-width="18"/>
<circle cx="250" cy="122" r="24" fill="#000"/>
<circle cx="458" cy="250" r="24" fill="#000"/>
<circle cx="250" cy="250" r="44" fill="#000"/>
</svg>
</div>

<!-- 8. Orbite elliptique inclinée -->
<div class="cell">
<svg viewBox="0 0 500 500" xmlns="http://www.w3.org/2000/svg">
<ellipse cx="250" cy="250" rx="210" ry="115" transform="rotate(-35 250 250)" fill="none" stroke="#000" stroke-width="20"/>
<circle cx="184" cy="156" r="28" fill="#000"/>
<circle cx="250" cy="250" r="52" fill="#000"/>
</svg>
</div>

<!-- 9. Planète avec traîne -->
<div class="cell">
<svg viewBox="0 0 500 500" xmlns="http://www.w3.org/2000/svg">
<circle cx="250" cy="250" r="182" fill="none" stroke="#000" stroke-width="18"/>
<circle cx="250" cy="250" r="52" fill="#000"/>
<circle cx="379" cy="121" r="30" fill="#000"/>
<circle cx="328" cy="82" r="20" fill="#000"/>
<circle cx="282" cy="68" r="13" fill="#000"/>
<circle cx="234" cy="66" r="7" fill="#000"/>
</svg>
</div>

<!-- 10. Centre en anneau (double ring) -->
<div class="cell">
<svg viewBox="0 0 500 500" xmlns="http://www.w3.org/2000/svg">
<circle cx="250" cy="250" r="182" fill="none" stroke="#000" stroke-width="20"/>
<circle cx="250" cy="68" r="28" fill="#000"/>
<circle cx="250" cy="250" r="68" fill="none" stroke="#000" stroke-width="30"/>
</svg>
</div>

<!-- 11. Grande planète -->
<div class="cell">
<svg viewBox="0 0 500 500" xmlns="http://www.w3.org/2000/svg">
<circle cx="250" cy="250" r="175" fill="none" stroke="#000" stroke-width="18"/>
<circle cx="250" cy="75" r="55" fill="#000"/>
<circle cx="250" cy="250" r="35" fill="#000"/>
</svg>
</div>

<!-- 12. Planète à 3h (droite) -->
<div class="cell">
<svg viewBox="0 0 500 500" xmlns="http://www.w3.org/2000/svg">
<circle cx="250" cy="250" r="182" fill="none" stroke="#000" stroke-width="20"/>
<circle cx="432" cy="250" r="30" fill="#000"/>
<circle cx="250" cy="250" r="58" fill="#000"/>
</svg>
</div>

<!-- 13. Étoile décentrée (orbite excentrique) -->
<div class="cell">
<svg viewBox="0 0 500 500" xmlns="http://www.w3.org/2000/svg">
<circle cx="250" cy="250" r="182" fill="none" stroke="#000" stroke-width="20"/>
<circle cx="250" cy="68" r="28" fill="#000"/>
<circle cx="308" cy="250" r="58" fill="#000"/>
</svg>
</div>

<!-- 14. Orbite en pointillés -->
<div class="cell">
<svg viewBox="0 0 500 500" xmlns="http://www.w3.org/2000/svg">
<circle cx="250" cy="250" r="182" fill="none" stroke="#000" stroke-width="22" stroke-dasharray="55 28"/>
<circle cx="250" cy="68" r="30" fill="#000"/>
<circle cx="250" cy="250" r="58" fill="#000"/>
</svg>
</div>

<!-- 15. Ellipse très aplatie (anneau de Saturne) -->
<div class="cell">
<svg viewBox="0 0 500 500" xmlns="http://www.w3.org/2000/svg">
<ellipse cx="250" cy="250" rx="215" ry="75" fill="none" stroke="#000" stroke-width="20"/>
<circle cx="250" cy="250" r="60" fill="#000"/>
<circle cx="222" cy="177" r="26" fill="#000"/>
</svg>
</div>

<!-- 16. Triple anneau + centre -->
<div class="cell">
<svg viewBox="0 0 500 500" xmlns="http://www.w3.org/2000/svg">
<circle cx="250" cy="250" r="200" fill="none" stroke="#000" stroke-width="18"/>
<circle cx="250" cy="250" r="145" fill="none" stroke="#000" stroke-width="18"/>
<circle cx="250" cy="250" r="90" fill="none" stroke="#000" stroke-width="18"/>
<circle cx="250" cy="250" r="33" fill="#000"/>
</svg>
</div>

<!-- 17. Anneau + planète seule (sans centre) -->
<div class="cell">
<svg viewBox="0 0 500 500" xmlns="http://www.w3.org/2000/svg">
<circle cx="250" cy="250" r="182" fill="none" stroke="#000" stroke-width="20"/>
<circle cx="250" cy="68" r="48" fill="#000"/>
</svg>
</div>

<!-- 18. Deux planètes gauche / droite -->
<div class="cell">
<svg viewBox="0 0 500 500" xmlns="http://www.w3.org/2000/svg">
<circle cx="250" cy="250" r="182" fill="none" stroke="#000" stroke-width="20"/>
<circle cx="68" cy="250" r="28" fill="#000"/>
<circle cx="432" cy="250" r="28" fill="#000"/>
<circle cx="250" cy="250" r="55" fill="#000"/>
</svg>
</div>

<!-- 19. Orbite diamant (carré à 45°) -->
<div class="cell">
<svg viewBox="0 0 500 500" xmlns="http://www.w3.org/2000/svg">
<rect x="140" y="140" width="220" height="220" fill="none" stroke="#000" stroke-width="22" transform="rotate(45 250 250)"/>
<circle cx="250" cy="94" r="28" fill="#000"/>
<circle cx="250" cy="250" r="52" fill="#000"/>
</svg>
</div>

<!-- 20. Orbite en points (8 satellites) -->
<div class="cell">
<svg viewBox="0 0 500 500" xmlns="http://www.w3.org/2000/svg">
<circle cx="250" cy="68" r="36" fill="#000"/>
<circle cx="379" cy="121" r="16" fill="#000"/>
<circle cx="432" cy="250" r="16" fill="#000"/>
<circle cx="379" cy="379" r="16" fill="#000"/>
<circle cx="250" cy="432" r="16" fill="#000"/>
<circle cx="121" cy="379" r="16" fill="#000"/>
<circle cx="68" cy="250" r="16" fill="#000"/>
<circle cx="121" cy="121" r="16" fill="#000"/>
<circle cx="250" cy="250" r="56" fill="#000"/>
</svg>
</div>

</div>
</body>
</html>

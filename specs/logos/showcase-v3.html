<!DOCTYPE html>
<html lang="en">
<head>

<title>DJEXA — Logo Proposals v3 — Orbite en points</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #fff; }
.grid {
  display: grid;
  grid-template-columns: repeat(5, 1fr);
}
.cell {
  aspect-ratio: 1;
  border: 1px solid #e5e5e5;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 24px;
}
.cell svg {
  width: 100%;
  height: 100%;
  max-width: 80px;
  max-height: 80px;
}
</style>
</head>

<div class="grid">
